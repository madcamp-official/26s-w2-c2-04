# 백엔드-프런트엔드 연동 테스트용 로컬 스택. postgres/redis/backend을 함께 띄웁니다.
# 프런트엔드(Flutter)는 여기 포함하지 않습니다 — flutter run으로 네이티브/웹으로
# 직접 실행하면서 이 스택의 backend(http://localhost:5047)를 바라보게 하면 됩니다.
#
# 사용법:
#   docker compose up --build -d
#   docker compose logs -f backend
#   docker compose down          # -v를 붙이면 DB 데이터까지 삭제

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: backend_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - splendor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backend_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=backend_dev;Username=postgres;Password=devpass"
      ConnectionStrings__Redis: "redis:6379"
    ports:
      - "5047:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  splendor_postgres_data:
