name: Backend CI

# 배포는 GitHub Actions가 아니라 VM에 설치된 systemd 타이머가 dev/backend를
# 주기적으로 polling해서 처리한다(레포가 공개 저장소라 별도 인증 없이 git
# pull 가능, self-hosted runner 등록 토큰처럼 repo admin 권한이 필요한
# 방식은 쓰지 않음). 이 워크플로는 push마다 테스트만 돌려 CI 신호를 준다.

on:
  push:
    branches: [dev/backend]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet test backend/Backend.Tests/Backend.Tests.csproj --configuration Release
